<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don Héctor Licorera — Logo v2 Ámbar</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --negro:      #0A0A08;
    --superficie: #131310;
    --borde:      #252520;
    --ambar:      #C8920A;
    --ambar-cl:   #E0A820;
    --ambar-os:   #8A6200;
    --verde:      #4A7A28;
    --blanco:     #F0EBE0;
    --blanco-dim: #8A8478;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--negro);
    font-family: 'DM Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 64px 32px;
    min-height: 100vh;
    gap: 0;
  }

  /* ── Título de sección ── */
  .sec-label {
    font-size: 9px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ambar);
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    max-width: 680px;
  }
  .sec-label::before,
  .sec-label::after { content: ''; flex: 1; height: 1px; background: var(--borde); }

  /* ── Logo container ── */
  .logo-wrap {
    width: 100%;
    max-width: 680px;
    margin-bottom: 2px;
  }

  .logo-svg {
    width: 100%;
    height: auto;
    display: block;
  }

  /* ── Variantes en fila ── */
  .variants {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    width: 100%;
    max-width: 680px;
    margin-top: 1px;
    background: var(--borde);
    margin-bottom: 64px;
  }

  .variant-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 20px;
    gap: 16px;
  }
  .vc-dark  { background: var(--negro); }
  .vc-ambar { background: var(--ambar); }
  .vc-light { background: var(--blanco); }

  .variant-cell svg { width: 100%; height: auto; max-width: 180px; }

  .vc-tag {
    font-size: 8px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .vc-dark  .vc-tag { color: var(--blanco-dim); }
  .vc-ambar .vc-tag { color: rgba(10,8,0,0.45); }
  .vc-light .vc-tag { color: #8A8478; }

  /* ── Isotipo / ícono solo ── */
  .isotipo-row {
    display: flex;
    gap: 28px;
    align-items: flex-end;
    margin-bottom: 64px;
    width: 100%;
    max-width: 680px;
  }

  .iso-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .iso-box {
    background: var(--negro);
    border: 1px solid var(--borde);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .iso-xl { width: 120px; height: 120px; border-radius: 28px; }
  .iso-lg { width: 80px;  height: 80px;  border-radius: 18px; }
  .iso-md { width: 52px;  height: 52px;  border-radius: 12px; }
  .iso-sm { width: 36px;  height: 36px;  border-radius: 8px; }

  .iso-box svg { width: 58%; height: 58%; }

  .iso-tag {
    font-size: 8px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--blanco-dim);
  }

  /* ── Folio ── */
  .folio {
    width: 100%;
    max-width: 680px;
    border-top: 1px solid var(--borde);
    padding-top: 24px;
    display: flex;
    justify-content: space-between;
    margin-top: 32px;
  }
  .folio-brand {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--ambar);
  }
  .folio-meta {
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--blanco-dim);
    text-align: right;
    line-height: 1.8;
  }
</style>
</head>
